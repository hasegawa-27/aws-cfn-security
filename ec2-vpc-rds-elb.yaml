AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VPC + EC2 + RDS (MySQL) + ALB の構成テンプレート
  - パブリックサブネット x2（EC2, ALB用）
  - プライベートサブネット x2（RDS用）
  - SSH は指定IPのみ許可

# ============================================================
# パラメータ（デプロイ時に入力する値）
# ============================================================
Parameters:

  # --- ネットワーク ---
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: VPC の CIDR ブロック

  PublicSubnet1Cidr:
    Type: String
    Default: "10.0.1.0/24"
    Description: パブリックサブネット1（AZ-a）

  PublicSubnet2Cidr:
    Type: String
    Default: "10.0.2.0/24"
    Description: パブリックサブネット2（AZ-c）※ALB は2AZ必要

  PrivateSubnet1Cidr:
    Type: String
    Default: "10.0.11.0/24"
    Description: プライベートサブネット1（AZ-a）RDS用

  PrivateSubnet2Cidr:
    Type: String
    Default: "10.0.12.0/24"
    Description: プライベートサブネット2（AZ-c）RDS用

  # --- EC2 ---
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: "【必須】EC2 に SSH 接続するためのキーペア名"

  Ec2InstanceType:
    Type: String
    Default: "t3.micro"
    AllowedValues: ["t3.micro", "t3.small", "t3.medium"]
    Description: EC2 インスタンスタイプ

  Ec2AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
    Description: EC2 の AMI（デフォルト：最新の Amazon Linux 2023）

  # --- SSH アクセス制限 ---
  SshAllowedCidr:
    Type: String
    Description: "【必須】SSH を許可するあなたのIPアドレス（例: 203.0.113.10/32）"
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    ConstraintDescription: "x.x.x.x/xx 形式で入力してください"

  # --- RDS ---
  DbName:
    Type: String
    Default: "mydb"
    Description: データベース名

  DbUser:
    Type: String
    Default: "admin"
    Description: DB 管理者ユーザー名

  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: "【必須】DB パスワード（8文字以上）"

  DbInstanceClass:
    Type: String
    Default: "db.t3.micro"
    AllowedValues: ["db.t3.micro", "db.t3.small", "db.t3.medium"]
    Description: RDS インスタンスクラス

# ============================================================
# リソース
# ============================================================
Resources:

  # ----------------------------------------------------------
  # VPC & ネットワーク
  # ----------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  # インターネットゲートウェイ（VPC からインターネットへの出入口）
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # パブリックサブネット（EC2・ALB が置かれる、インターネット接続可能なサブネット）
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-2"

  # プライベートサブネット（RDS が置かれる、インターネット非接続のサブネット）
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-2"

  # ルートテーブル（パブリックサブネット用：インターネット経由のルートを追加）
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ----------------------------------------------------------
  # セキュリティグループ
  # ----------------------------------------------------------

  # ALB 用セキュリティグループ（HTTP/HTTPS をインターネット全体から受け付ける）
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - HTTP/HTTPS inbound from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: HTTPS from internet
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb-sg"

  # EC2 用セキュリティグループ
  # - SSH: 指定IPのみ
  # - HTTP: ALB からのみ
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 - SSH from specified IP, HTTP from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshAllowedCidr
          Description: SSH from your IP only
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: HTTP from ALB only
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ec2-sg"

  # RDS 用セキュリティグループ（MySQL ポート 3306 を EC2 からのみ許可）
  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS - MySQL inbound from EC2 only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
          Description: MySQL from EC2 only
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-rds-sg"

  # ----------------------------------------------------------
  # EC2
  # ----------------------------------------------------------
  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref Ec2InstanceType
      ImageId: !Ref Ec2AmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ec2"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # パッケージ更新と Web サーバーインストール（必要に応じて変更してください）
          dnf update -y
          dnf install -y httpd
          systemctl enable httpd
          systemctl start httpd
          echo "<h1>Hello from ${AWS::StackName}</h1>" > /var/www/html/index.html

  # ----------------------------------------------------------
  # RDS (MySQL)
  # ----------------------------------------------------------

  # RDS は2つのサブネットが必要なため「サブネットグループ」を作成
  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS MySQL
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-rds-subnet-group"

  RdsInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot  # スタック削除時にスナップショットを取得
    Properties:
      DBInstanceIdentifier: !Sub "${AWS::StackName}-rds"
      DBName: !Ref DbName
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: "20"
      MasterUsername: !Ref DbUser
      MasterUserPassword: !Ref DbPassword
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      MultiAZ: false           # 本番環境では true 推奨
      StorageEncrypted: true
      BackupRetentionPeriod: 7 # 7日間自動バックアップ
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-rds"

  # ----------------------------------------------------------
  # ALB (Application Load Balancer)
  # ----------------------------------------------------------
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb"

  # ターゲットグループ（ALB からトラフィックを転送する先の EC2 グループ）
  AlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-tg"
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: "/"
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Targets:
        - Id: !Ref Ec2Instance
          Port: 80
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-tg"

  # リスナー（ALB がポート 80 で受け取ってターゲットグループに転送）
  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroup

# ============================================================
# 出力（デプロイ後に確認できる情報）
# ============================================================
Outputs:

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  AlbDnsName:
    Description: ALB の DNS 名（ブラウザでアクセスできる URL）
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"

  Ec2PublicIp:
    Description: EC2 のパブリック IP（SSH 接続先）
    Value: !GetAtt Ec2Instance.PublicIp

  RdsEndpoint:
    Description: RDS エンドポイント（EC2 から接続する際のホスト名）
    Value: !GetAtt RdsInstance.Endpoint.Address

  SshCommand:
    Description: SSH 接続コマンド例
    Value: !Sub "ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${Ec2Instance.PublicIp}"