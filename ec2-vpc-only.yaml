AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VPC + EC2 の構成テンプレート
  - パブリックサブネット x1（EC2用）
  - SSH は指定IPのみ許可

# ============================================================
# パラメータ（デプロイ時に入力する値）
# ============================================================
Parameters:

  # --- ネットワーク ---
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: VPC の CIDR ブロック

  PublicSubnet1Cidr:
    Type: String
    Default: "10.0.1.0/24"
    Description: パブリックサブネット1（AZ-a）

  # --- EC2 ---
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: "【必須】EC2 に SSH 接続するためのキーペア名"

  Ec2InstanceType:
    Type: String
    Default: "t3.micro"
    AllowedValues: ["t3.micro", "t3.small", "t3.medium"]
    Description: EC2 インスタンスタイプ

  Ec2AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
    Description: EC2 の AMI（デフォルト：最新の Amazon Linux 2023）

  # --- SSH アクセス制限 ---
  SshAllowedCidr:
    Type: String
    Description: "【必須】SSH を許可するあなたのIPアドレス（例: 203.0.113.10/32）"
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    ConstraintDescription: "x.x.x.x/xx 形式で入力してください"

# ============================================================
# リソース
# ============================================================
Resources:

  # ----------------------------------------------------------
  # VPC & ネットワーク
  # ----------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  # インターネットゲートウェイ（VPC からインターネットへの出入口）
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # パブリックサブネット（EC2 が置かれる、インターネット接続可能なサブネット）
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-1"

  # ルートテーブル（パブリックサブネット用：インターネット経由のルートを追加）
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # ----------------------------------------------------------
  # セキュリティグループ
  # ----------------------------------------------------------

  # EC2 用セキュリティグループ
  # - SSH: 指定IPのみ
  # - HTTP: インターネット全体から
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 - SSH from specified IP, HTTP from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshAllowedCidr
          Description: SSH from your IP only
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: HTTP from internet
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ec2-sg"

  # ----------------------------------------------------------
  # EC2
  # ----------------------------------------------------------
  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref Ec2InstanceType
      ImageId: !Ref Ec2AmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ec2"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # パッケージ更新と Web サーバーインストール（必要に応じて変更してください）
          dnf update -y
          dnf install -y httpd
          systemctl enable httpd
          systemctl start httpd
          echo "<h1>Hello from ${AWS::StackName}</h1>" > /var/www/html/index.html

# ============================================================
# 出力（デプロイ後に確認できる情報）
# ============================================================
Outputs:

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  Ec2PublicIp:
    Description: EC2 のパブリック IP（SSH 接続先 / ブラウザでアクセスできる IP）
    Value: !GetAtt Ec2Instance.PublicIp

  SshCommand:
    Description: SSH 接続コマンド例
    Value: !Sub "ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${Ec2Instance.PublicIp}"

  HttpUrl:
    Description: ブラウザでアクセスできる URL
    Value: !Sub "http://${Ec2Instance.PublicIp}"
